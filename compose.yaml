services:
  competition:
    build:
      context: .
      dockerfile: ./cmd/competition/Dockerfile
    command:
      - "--address"
      - "0.0.0.0:11234"
    expose:
      - "11234"
    environment:
      - "ENV=dev-compose"
    networks:
      - dc1
      - platform

  simple:
    build:
      context: .
      dockerfile: ./cmd/simpled/Dockerfile
    command:
      - "game-instance"
      - "--competition-service"
      - "competition:11234"
      - "--service-address"
      - "0.0.0.0:11235"
      - "--advertise-address"
      - "simple:11235"
    expose:
      - "11235"
    environment:
      - "ENV=dev-compose"
    depends_on:
      - competition
    networks:
      - dc1
      - platform

  player_1:
    build:
      context: .
      dockerfile: ./cmd/simple/Dockerfile
    command:
      - "--competition-address"
      - "competition:11234"
      - "--startup-delay=1s"
    environment:
      - "ENV=dev-compose"
    depends_on:
      - simple
    networks:
      - dc1
      - platform

  player_2:
    build:
      context: .
      dockerfile: ./cmd/simple/Dockerfile
    command:
      - "--competition-address"
      - "competition:11234"
      - "--startup-delay=1s"
    environment:
      - "ENV=dev-compose"
    depends_on:
      - competition
      - simple
    networks:
      - dc1
      - platform

networks:
  dc1:
    name: npcs_dc1_internal
    external: true
  platform:
    name: npcs_platform
    external: true
